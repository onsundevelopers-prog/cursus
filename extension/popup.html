<!DOCTYPE html>
<html>
<head>
  <title>Cursus AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="Cursus Logo" class="logo">
      <h1>Cursus <span class="badge">AI</span></h1>
    </div>
    
    <div class="status-card">
      <div id="status-text">Ready to Autofill</div>
      <div class="pulse"></div>
    </div>

    <div class="action-buttons">
      <button id="autofill-btn" class="primary-btn">
        <span class="icon">⚡</span> Autofill Application
      </button>
      <button id="optimize-btn" class="secondary-btn">
        <span class="icon">✨</span> AI Resume Match
      </button>
    </div>

    <div class="info-section">
      <p>Compatible with Workday, Lever, Greenhouse, and LinkedIn.</p>
    </div>

    <div class="footer">
      <a href="https://cursus.ai/dashboard" target="_blank">Open Dashboard</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
